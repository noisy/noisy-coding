# Build and push the Docker image FROM CI, not from anyone's laptop:
# the image carries SLSA provenance (repo + commit + workflow) and an
# SBOM, so anyone can verify exactly what it was built from with
#   docker buildx imagetools inspect noisy/noisy-coding:latest
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: noisy/noisy-coding
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/noisy/noisy-coding
            org.opencontainers.image.description=Voice coding for Claude Code — talk to your agent while it works
            org.opencontainers.image.licenses=MIT
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
      # Docker Hub does not read the repo README by itself — sync it, so
      # the image page shows the same docker-first instructions.
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: noisy/noisy-coding
          short-description: "Voice coding for Claude Code — talk to your agent while it works"
