name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libportaudio2
      - run: uv sync
      - run: uv run pytest tests/unit -q

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: dashboard }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: dashboard/package-lock.json }
      - run: npm ci
      - run: npx vitest run
      - run: npx vue-tsc --noEmit
      - run: npx vite build
