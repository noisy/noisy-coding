<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>noisy-coding</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- One sprite holds every voice portrait — preloading it makes the
         first avatar (and every voice switch) render instantly. -->
    <link rel="preload" as="image" href="/avatars.png" />
    <script>
      // The dev instance gets the amber icon — same signal as its
      // dashboard badge, visible even on a background tab.
      if (location.port && location.port !== "8765") {
        document.querySelector('link[rel="icon"]').href = "/favicon-dev.svg";
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
